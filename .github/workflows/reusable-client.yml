name: Reusable — Client

# Reusable workflow: client lint, typecheck, and build.
# Called by ci.yml — not triggered directly.

on:
  workflow_call:

jobs:
  client:
    name: Client (lint • typecheck • build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
