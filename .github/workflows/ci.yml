name: CI

# Orchestrator — each stage lives in its own reusable workflow so the
# pipeline stays easy to review:
#   reusable-server.yml  lint, typecheck, test, build (server)
#   reusable-client.yml  lint, typecheck, build (client)
#   reusable-docker.yml  Docker image build
#   reusable-e2e.yml     Playwright end-to-end tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    uses: ./.github/workflows/reusable-server.yml

  client:
    uses: ./.github/workflows/reusable-client.yml

  docker:
    uses: ./.github/workflows/reusable-docker.yml

  e2e:
    uses: ./.github/workflows/reusable-e2e.yml
