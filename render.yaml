services:
  - type: web
    name: rentos-api
    runtime: docker
    repo: https://github.com/your-org/rentos.git
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: MONGO_URI
        fromDatabase:
          name: rentos-mongo
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://rentos-api.onrender.com
      - key: PAYMENTS_PROVIDER_MODE
        value: simulated
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@rentos.gh
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: rentos-mongo
    databaseName: rentos
    ipAllowList: []
