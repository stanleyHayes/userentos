<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64">
      <stop stop-color="#0f1f33" />
      <stop offset="0.5" stop-color="#1e3a5f" />
      <stop offset="1" stop-color="#2d5a8e" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="64" y2="64">
      <stop stop-color="#fbbf24" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="green" x1="20" y1="40" x2="44" y2="56">
      <stop stop-color="#10b981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" />

  <!-- Circuit grid -->
  <g opacity="0.08" stroke="white" stroke-width="0.5">
    <line x1="16" y1="0" x2="16" y2="64" />
    <line x1="32" y1="0" x2="32" y2="64" />
    <line x1="48" y1="0" x2="48" y2="64" />
    <line x1="0" y1="16" x2="64" y2="16" />
    <line x1="0" y1="32" x2="64" y2="32" />
    <line x1="0" y1="48" x2="64" y2="48" />
  </g>

  <!-- Circuit nodes -->
  <g opacity="0.15" fill="white">
    <circle cx="16" cy="16" r="1.2" />
    <circle cx="48" cy="16" r="1.2" />
    <circle cx="16" cy="48" r="1.2" />
    <circle cx="48" cy="48" r="1.2" />
  </g>

  <!-- Roof -->
  <path d="M8 30L32 8L56 30" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.15" />
  <path d="M8 30L32 8L56 30" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  <path d="M16 28L32 14L48 28" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.2" />

  <!-- Building -->
  <rect x="14" y="30" width="36" height="24" rx="2" fill="white" fill-opacity="0.92" />
  <line x1="14" y1="36" x2="50" y2="36" stroke="#1e3a5f" stroke-width="0.5" opacity="0.1" />
  <line x1="14" y1="42" x2="50" y2="42" stroke="#1e3a5f" stroke-width="0.5" opacity="0.1" />

  <!-- Left windows -->
  <rect x="17" y="32" width="5" height="5" rx="1" fill="#1e3a5f" fill-opacity="0.25" />
  <rect x="17" y="38.5" width="5" height="5" rx="1" fill="#1e3a5f" fill-opacity="0.2" />
  <line x1="19.5" y1="32" x2="19.5" y2="37" stroke="white" stroke-width="0.5" opacity="0.5" />
  <line x1="17" y1="34.5" x2="22" y2="34.5" stroke="white" stroke-width="0.5" opacity="0.5" />

  <!-- Right windows -->
  <rect x="42" y="32" width="5" height="5" rx="1" fill="#1e3a5f" fill-opacity="0.25" />
  <rect x="42" y="38.5" width="5" height="5" rx="1" fill="#1e3a5f" fill-opacity="0.2" />
  <line x1="44.5" y1="32" x2="44.5" y2="37" stroke="white" stroke-width="0.5" opacity="0.5" />
  <line x1="42" y1="34.5" x2="47" y2="34.5" stroke="white" stroke-width="0.5" opacity="0.5" />

  <!-- Door -->
  <rect x="26" y="37" width="12" height="17" rx="2" fill="url(#gold)" />
  <path d="M26 39C26 37.343 27.343 36 29 36H35C36.657 36 38 37.343 38 39V37H26V39Z" fill="#fbbf24" opacity="0.5" />
  <circle cx="35" cy="46" r="1.2" fill="#92400e" />
  <rect x="28" y="39" width="3.5" height="5" rx="0.5" fill="#f59e0b" opacity="0.5" />
  <rect x="32.5" y="39" width="3.5" height="5" rx="0.5" fill="#f59e0b" opacity="0.5" />

  <!-- Chimney -->
  <rect x="42" y="12" width="6" height="18" rx="1.5" fill="#1a2d47" />
  <rect x="41" y="11" width="8" height="3" rx="1" fill="#1a2d47" />
  <circle cx="45" cy="8" r="2" fill="white" opacity="0.12" />
  <circle cx="47" cy="5" r="1.5" fill="white" opacity="0.08" />

  <!-- Ghana star -->
  <path d="M32 22L33.2 25.2L36.6 25.2L33.9 27.2L34.8 30.4L32 28.4L29.2 30.4L30.1 27.2L27.4 25.2L30.8 25.2Z" fill="url(#gold)" opacity="0.85" />

  <!-- Tech connection lines -->
  <g stroke="url(#green)" stroke-width="1" opacity="0.6">
    <path d="M14 44H8" stroke-linecap="round" />
    <circle cx="7" cy="44" r="1.5" fill="#10b981" opacity="0.8" />
    <path d="M50 44H56" stroke-linecap="round" />
    <circle cx="57" cy="44" r="1.5" fill="#10b981" opacity="0.8" />
    <path d="M50 38H54" stroke-linecap="round" />
    <circle cx="55" cy="38" r="1" fill="#10b981" opacity="0.6" />
    <path d="M14 38H10" stroke-linecap="round" />
    <circle cx="9" cy="38" r="1" fill="#10b981" opacity="0.6" />
  </g>

  <!-- Foundation -->
  <rect x="12" y="54" width="40" height="3" rx="1.5" fill="url(#green)" opacity="0.7" />
  <rect x="18" y="57" width="28" height="1.5" rx="0.75" fill="url(#green)" opacity="0.3" />
</svg>
