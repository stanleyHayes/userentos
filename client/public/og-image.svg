  <!-- Glow orbs -->
  <circle cx="900" cy="200" r="200" fill="#f59e0b" opacity="0.04" />
  <circle cx="300" cy="450" r="180" fill="#3b82f6" opacity="0.04" />
  <circle cx="1000" cy="500" r="120" fill="#10b981" opacity="0.03" />

  <!-- Logo icon (scaled up from favicon) -->
  <g transform="translate(100, 200)">
    <rect width="88" height="88" rx="22" fill="url(#iconBg)" />
    <path d="M18 42L44 14L70 42" stroke="url(#roof)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <rect x="26" y="42" width="36" height="30" rx="3" fill="white" fill-opacity="0.9" />
    <rect x="37" y="52" width="14" height="20" rx="2.5" fill="#f59e0b" />
    <circle cx="48" cy="62" r="1.8" fill="#92400e" />
    <rect x="28.5" y="46" width="7" height="7" rx="1.5" fill="#1e3a5f" fill-opacity="0.3" />
    <rect x="52.5" y="46" width="7" height="7" rx="1.5" fill="#1e3a5f" fill-opacity="0.3" />
  </g>

  <!-- "RentOS" text -->
  <text x="210" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">
    Rent<tspan fill="#f59e0b">OS</tspan>
  </text>

  <!-- "GHANA" badge -->
  <rect x="210" y="264" width="80" height="26" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="250" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">GHANA</text>

  <!-- Tagline -->
  <text x="100" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">
    National Digital Rental Housing Platform
  </text>

  <!-- Feature pills -->
  <g transform="translate(100, 400)">
    <!-- Legal Compliance -->
    <rect x="0" y="0" width="200" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <circle cx="24" cy="22" r="6" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M21.5 22L23 23.5L26.5 20" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="42" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Legal Compliance</text>

    <!-- Mobile Payments -->
    <rect x="216" y="0" width="200" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <rect x="234" y="15" width="14" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="234" y1="19" x2="248" y2="19" stroke="#f59e0b" stroke-width="1.5" />
    <text x="258" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Mobile Payments</text>

    <!-- Smart Savings -->
    <rect x="432" y="0" width="186" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <ellipse cx="452" cy="24" rx="7" ry="5" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="448" y1="20" x2="456" y2="20" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />
    <text x="468" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Smart Savings</text>

    <!-- Credit Scoring -->
    <rect x="634" y="0" width="192" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <circle cx="654" cy="22" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M654 17L655.5 21H660L656.5 23.5L657.8 27.5L654 25L650.2 27.5L651.5 23.5L648 21H652.5Z" fill="#f59e0b" opacity="0.6" />
    <text x="670" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Credit Scoring</text>
  </g>

  <!-- URL -->
  <text x="100" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.25)" letter-spacing="0.5">rentosgh.vercel.app</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#roof)" opacity="0.8" />
