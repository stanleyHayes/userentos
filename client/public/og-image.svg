<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop stop-color="#0a1628" />
      <stop offset="0.5" stop-color="#0f1f33" />
      <stop offset="1" stop-color="#1e3a5f" />
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="88" y2="88">
      <stop stop-color="#1e3a5f" />
      <stop offset="1" stop-color="#2d5a8e" />
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#f59e0b" />
      <stop offset="1" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="pillBg" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="rgba(255,255,255,0.06)" />
      <stop offset="1" stop-color="rgba(255,255,255,0.03)" />
    </linearGradient>
  </defs>

